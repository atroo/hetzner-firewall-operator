{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "hetzner-firewall-operator.fullname" . }}
  labels:
    {{- include "hetzner-firewall-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "hetzner-firewall-operator.fullname" . }}
  labels:
    {{- include "hetzner-firewall-operator.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "hetzner-firewall-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "hetzner-firewall-operator.fullname" . }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
