apiVersion: v1
kind: Service
metadata:
  name: {{ include "hetzner-firewall-operator.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hetzner-firewall-operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ (split ":" .Values.operator.metricsAddr)._1 | default 8080 }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "hetzner-firewall-operator.selectorLabels" . | nindent 4 }}
