apiVersion: v1
kind: Namespace
metadata:
  name: hetzner-firewall-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hetzner-firewall-operator
  namespace: hetzner-firewall-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hetzner-firewall-operator
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hetzner-firewall-operator
subjects:
  - kind: ServiceAccount
    name: hetzner-firewall-operator
    namespace: hetzner-firewall-operator
roleRef:
  kind: ClusterRole
  name: hetzner-firewall-operator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: hetzner-firewall-operator
  namespace: hetzner-firewall-operator
type: Opaque
stringData:
  HCLOUD_TOKEN: "REPLACE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hetzner-firewall-operator
  namespace: hetzner-firewall-operator
  labels:
    app: hetzner-firewall-operator
spec:
  replicas: 2 # HA with leader election
  selector:
    matchLabels:
      app: hetzner-firewall-operator
  template:
    metadata:
      labels:
        app: hetzner-firewall-operator
    spec:
      serviceAccountName: hetzner-firewall-operator
      containers:
        - name: operator
          image: ghcr.io/atroo/hetzner-firewall-operator:latest
          args:
            - --firewall-name=k8s-cluster
            - --reconcile-interval=5m
            - --allow-ssh-from=YOUR_IP/32
          env:
            - name: HCLOUD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hetzner-firewall-operator
                  key: HCLOUD_TOKEN
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
